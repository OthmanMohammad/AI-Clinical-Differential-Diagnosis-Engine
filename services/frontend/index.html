<!doctype html>
<html lang="en" class="light" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="PathoDX — AI Clinical Differential Diagnosis Engine. Graph RAG + LLM reasoning for clinical decision support."
    />
    <title>PathoDX — Clinical Differential Diagnosis</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!--
      DO NOT EDIT THE INLINE SCRIPT BELOW WITHOUT UPDATING THE CSP HASH.
      The production Content-Security-Policy in public/_headers allows
      this exact script via a sha256 hash. Any byte change (including
      whitespace) will cause the browser to block it and users will see
      a flash of wrong theme on dark mode.

      Current allowed hash:
        'sha256-TLYcrYi/AxSkVl3rTi97NMRB1cEIpjDrodsC4Oit0yg='

      To regenerate after editing, run:
        python3 -c "import hashlib,base64; \
          s=open('services/frontend/index.html').read(); \
          start=s.index('<script>')+len('<script>'); \
          end=s.index('</script>',start); \
          print('sha256-'+base64.b64encode(hashlib.sha256(s[start:end].encode()).digest()).decode())"
      and paste the result into services/frontend/public/_headers.
    -->
    <script>
      // Prevent flash of wrong theme before React mounts. Default to light.
      (function () {
        try {
          var stored = localStorage.getItem("pathodx.theme");
          var theme = stored === "dark" ? "dark" : "light";
          document.documentElement.classList.remove("light", "dark");
          document.documentElement.classList.add(theme);
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
