<!doctype html>
<html lang="en" class="light" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="PathoDX — AI Clinical Differential Diagnosis Engine. Graph RAG + LLM reasoning for clinical decision support."
    />
    <title>PathoDX — Clinical Differential Diagnosis</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!--
      Theme bootstrap — runs before React mounts to prevent a flash of
      wrong theme. Lives as an external file at public/theme-init.js so
      our CSP (in public/_headers) doesn't need a sha256 hash to allow
      inline execution.
    -->
    <script src="/theme-init.js"></script>
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
