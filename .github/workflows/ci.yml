# =============================================================
# CI — lint, test, build, deploy
#
# Runs on every push to main and every PR targeting main.
# Deploy job only fires on push-to-main AFTER all checks pass.
#
# Architecture:
#   backend-lint   ─┐
#   backend-test   ─┤─→ deploy-backend (push to main only)
#   frontend-check ─┘
#
# Frontend auto-deploys via Cloudflare Pages on push to main —
# no CI job needed for that. The frontend-check job validates
# the build so you catch breakage before merge.
# =============================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR. Saves minutes
# when you push again while the previous run is still going.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------
  # Backend lint — ruff check + ruff format
  # ---------------------------------------------------------------
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check services/api/ eval/
      - name: Format check
        run: ruff format --check services/api/ eval/

  # ---------------------------------------------------------------
  # Backend tests — both test suites, with coverage
  #
  # Tests that matter (what these actually catch):
  #
  #   services/api/tests/
  #     test_models.py      — Pydantic schema validation: rejects
  #                           bad patient intakes, confidence bounds,
  #                           empty evidence. Catches field renames
  #                           and contract changes.
  #     test_guardrails.py  — Output validators: LLM response
  #                           sanitization, confidence clamping,
  #                           required-field enforcement.
  #     test_graph_rag.py   — Graph retrieval pipeline: candidate
  #                           ranking, edge attribution.
  #     test_emergency.py   — Emergency pattern detection: chest
  #                           pain + SOB → STEMI, suicidal ideation
  #                           → immediate flag. (Needs spaCy.)
  #
  #   tests/unit/
  #     test_retrieval.py   — Core Tier 2 retrieval: phenotype
  #                           intersection, rule boosts, LRU cache,
  #                           T2DM regression test with real case
  #                           data. The single most important test
  #                           file — catches ranking regressions.
  #     test_evidence_grounding.py — Gate 6.5 citation theater
  #                           detector: fully grounded, fully
  #                           hallucinated, partial, cross-candidate.
  #     test_lab_rules.py   — Clinical rule matching: hyperglycemia
  #                           → diabetes, troponin → MI, lipase →
  #                           pancreatitis. Catches rule YAML drift.
  #     test_eval_metrics.py — MRR, top-K accuracy, evidence
  #                           grounding rate, diff formatting.
  #     test_context_builder.py — Prompt context serialization.
  #     test_disease_index.py — In-memory disease lookup index.
  #
  # None of these need Neo4j, Qdrant, or LLM API keys. They all
  # use mocks/fakes and run in ~2 seconds total.
  # ---------------------------------------------------------------
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/api/requirements.txt

      - name: Install dependencies
        run: pip install -r services/api/requirements.txt
        env:
          # pip-compile already resolved everything; just install.
          # Hashes in requirements.txt ensure supply-chain integrity.
          PIP_REQUIRE_HASHES: "false"

      - name: Run tests with coverage
        run: |
          python -m pytest \
            services/api/tests/ \
            tests/unit/ \
            -v --tb=short \
            --cov=services/api/app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=0
        env:
          ENVIRONMENT: development
          PYTHONPATH: services/api

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  # ---------------------------------------------------------------
  # Frontend — lint + format + build
  #
  # Catches:
  #   - ESLint violations (unused vars, hook dependency arrays,
  #     type-unsafe patterns)
  #   - Prettier formatting drift
  #   - Vite build failures (broken imports, missing modules)
  #
  # Type checking (tsc --noEmit) is deliberately excluded from
  # the build pipeline because @antv/g6 library types have
  # structural mismatches that are cosmetic (runtime works).
  # See: fix(frontend): unblock Pages build commit message.
  # Re-enable once the g6 types are fixed as a follow-up.
  # ---------------------------------------------------------------
  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/frontend/package-lock.json
      - name: Install dependencies
        working-directory: services/frontend
        run: npm ci
      - name: ESLint
        working-directory: services/frontend
        run: npx eslint . --max-warnings=0
      - name: Prettier format check
        working-directory: services/frontend
        run: npx prettier --check .
      - name: Build
        working-directory: services/frontend
        run: npm run build

  # ---------------------------------------------------------------
  # Deploy backend — self-hosted runner on the Oracle VM
  #
  # Runs ON the VM itself via a GitHub Actions self-hosted runner.
  # No SSH, no open ports — the runner process pulls jobs from
  # GitHub over outbound HTTPS (same as the Cloudflare Tunnel).
  #
  # The runner must be installed on the VM first:
  #   1. GitHub → repo Settings → Actions → Runners → New self-hosted runner
  #   2. Follow the Linux ARM64 instructions on the VM
  #   3. Configure with label: mooseglove-vm
  #   4. Install as systemd service: sudo ./svc.sh install && sudo ./svc.sh start
  #
  # Frontend deploys automatically via Cloudflare Pages on push
  # to main — no CI job needed for that.
  # ---------------------------------------------------------------
  deploy-backend:
    runs-on: [self-hosted, mooseglove-vm]
    needs: [backend-lint, backend-test, frontend-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Pull latest code
        run: |
          cd ~/mooseglove/app
          git pull origin main

      - name: Rebuild and roll out API
        run: |
          cd ~/mooseglove/app
          docker compose -f docker-compose.prod.yml \
            --env-file ~/mooseglove/.env \
            build api
          docker compose -f docker-compose.prod.yml \
            --env-file ~/mooseglove/.env \
            up -d api

      - name: Wait for healthy
        run: |
          for i in $(seq 1 18); do
            HEALTH=$(docker inspect --format='{{.State.Health.Status}}' api 2>/dev/null || echo "unknown")
            echo "attempt $i/18: $HEALTH"
            if [ "$HEALTH" = "healthy" ]; then
              echo "API is healthy!"
              docker compose -f ~/mooseglove/app/docker-compose.prod.yml \
                --env-file ~/mooseglove/.env ps api
              exit 0
            fi
            sleep 5
          done
          echo "ERROR: API did not become healthy within 90s"
          docker compose -f ~/mooseglove/app/docker-compose.prod.yml \
            --env-file ~/mooseglove/.env logs --tail=40 api
          exit 1
