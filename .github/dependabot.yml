# =============================================================
# Dependabot — automated dependency security updates
#
# CONSERVATIVE config: only creates PRs for PATCH-level bumps
# and GitHub Actions version updates. Major and minor bumps are
# ignored because they often have breaking changes (e.g.
# langfuse 2→4, eslint 9→10) that need manual review.
#
# To bump a major/minor dep, do it manually:
#   cd services/frontend && npm install <pkg>@latest
#   cd services/api && pip-compile --upgrade-package <pkg>
# =============================================================

version: 2

updates:
  # Python backend — patch-only (security fixes)
  - package-ecosystem: pip
    directory: /services/api
    schedule:
      interval: weekly
      day: wednesday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - python
    ignore:
      # Block major and minor bumps — only allow patch
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  # Frontend npm — patch-only (security fixes)
  - package-ecosystem: npm
    directory: /services/frontend
    schedule:
      interval: weekly
      day: wednesday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - javascript
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  # GitHub Actions — all updates (safe, just version tags)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: wednesday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
