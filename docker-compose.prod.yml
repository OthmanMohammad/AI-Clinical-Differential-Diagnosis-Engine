# =============================================================
# MooseGlove — production stack for Oracle Always Free VM
#
# Runs the entire backend self-contained: FastAPI + Neo4j 5 +
# Qdrant + Cloudflare Tunnel. Local development still uses the
# default docker-compose.yml — DO NOT mix.
#
# Usage on the VM:
#   cd ~/mooseglove/app
#   docker compose -f docker-compose.prod.yml --env-file ~/mooseglove/.env up -d
#
# All secrets (NEO4J_PASSWORD, API_KEY, GROQ_API_KEY,
# CLOUDFLARED_TOKEN, ...) come from ~/mooseglove/.env which
# lives outside the repo.
#
# Network model (zero exposed public ports):
#   internet → cloudflare edge → outbound tunnel → cloudflared
#                                                 → api:8080
#   Nothing listens on the VM's public interface. Oracle Cloud
#   security list should only allow ingress on TCP/22 (SSH).
# =============================================================

name: mooseglove

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: api
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-/home/ubuntu/mooseglove/.env}
    environment:
      # Hard-coded for prod — override the dev defaults in the .env
      ENVIRONMENT: production
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      QDRANT_URL: http://qdrant:6333
      CORS_ORIGINS: "https://mooseglove.com,https://www.mooseglove.com"
      LANGFUSE_HOST: https://cloud.langfuse.com
    # No `ports:` block — api is only reachable via the internal
    # `mooseglove` network. The cloudflared sidecar is the ONLY
    # thing that talks to it, on the docker-internal DNS name
    # `api:8080`. This is how we get "zero exposed ports" — the
    # VM's public interface has no listeners at all.
    volumes:
      # Mount the repo's data dir read-only so ingestion artefacts like
      # medical_terms.json (generated post-PrimeKG load) are visible to
      # the API without rebuilding the image. symptom_synonyms.json is
      # also in here — it's the hand-curated synonym map checked into git.
      - ./data:/app/data:ro
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks: [mooseglove]
    logging: *default-logging

  neo4j:
    image: neo4j:5.25-community
    container_name: neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_server_memory_heap_initial__size: "2G"
      NEO4J_server_memory_heap_max__size: "4G"
      NEO4J_server_memory_pagecache_size: "2G"
      NEO4J_server_default__listen__address: "0.0.0.0"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
    ports:
      # Bound to localhost only — for ingestion scripts and debugging
      - "127.0.0.1:7687:7687"
      - "127.0.0.1:7474:7474"
    networks: [mooseglove]
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    logging: *default-logging

  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      # Bound to localhost only — for ingestion scripts and debugging
      - "127.0.0.1:6333:6333"
    networks: [mooseglove]
    logging: *default-logging

  # -----------------------------------------------------------
  # Cloudflare Tunnel — the only public ingress to this stack.
  #
  # Dials api.cloudflare.com outbound and keeps a persistent
  # connection open. Inbound requests to api.mooseglove.com land
  # at Cloudflare's edge, get WAF/rate-limit processed, and are
  # tunneled to this container, which proxies them to api:8080
  # (the Public Hostname route configured in the Zero Trust
  # dashboard).
  #
  # The tunnel token is provisioned in the Cloudflare Zero Trust
  # dashboard (Networks → Tunnels → mooseglove-vm → Install
  # connector) and pasted into ~/mooseglove/.env as
  # CLOUDFLARED_TOKEN. Never commit it — it IS the credential.
  #
  # If this container is down, api.mooseglove.com returns 530
  # from Cloudflare. That's the correct failure mode: no fallback
  # path around the tunnel exists.
  # -----------------------------------------------------------
  cloudflared:
    # `latest` is deliberate here — Cloudflare publishes multiple
    # releases a month and older pinned tags get deprecated
    # faster than we can keep up. We still disable in-container
    # auto-update (--no-autoupdate) so the binary can only change
    # by us pulling a new image, and we accept the (small) risk
    # of a bad upstream cut in exchange for always-fresh edge
    # compatibility. If a bad release lands, pin to the previous
    # tag here (see https://hub.docker.com/r/cloudflare/cloudflared/tags).
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARED_TOKEN}
      # Internal metrics endpoint on the mooseglove network only.
      # Not published to the host — grep it from another container
      # via `docker exec cloudflared wget -qO- localhost:2000/metrics`.
      TUNNEL_METRICS: 0.0.0.0:2000
    depends_on:
      - api
    networks: [mooseglove]
    logging: *default-logging

networks:
  mooseglove:
    name: mooseglove
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  qdrant_data:
